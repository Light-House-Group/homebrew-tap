name: Auto-bump casks

# Walks every cask in this tap and calls `brew bump-cask-pr` on each. brew
# does the livecheck + sha256 recompute + PR-creation work — idempotent: if a
# cask is already at the latest release, the call no-ops; if there's already
# an open PR for the new version, brew refuses to create a duplicate.
#
# Manual trigger: Actions → Auto-bump casks → "Run workflow".

on:
  schedule:
    # Hourly. Cheap (~1 min total) and catches most releases within the hour.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write       # push the bump branch
  pull-requests: write  # open the PR

jobs:
  autobump:
    runs-on: macos-14
    timeout-minutes: 20
    env:
      TAP_FULL_NAME: light-house-group/taps
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_ANALYTICS: "1"
      HOMEBREW_NO_INSTALL_FROM_API: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Symlink the checked-out repo as a tap so `brew` resolves casks under
      # their fully-qualified `light-house-group/taps/<cask>` name. We work
      # against the live checkout (rather than `brew tap` from the network) so
      # the workflow operates on the exact commit being CI'd.
      - name: Link tap into Homebrew prefix
        run: |
          set -euxo pipefail
          dest="$(brew --repo)/Library/Taps/light-house-group/homebrew-taps"
          mkdir -p "$(dirname "$dest")"
          rm -rf "$dest"
          ln -s "$PWD" "$dest"

      - name: Configure git author
        run: |
          git config --global user.name  "autobump-bot"
          git config --global user.email "autobump-bot@users.noreply.github.com"

      - name: Bump each cask
        run: |
          set -uo pipefail
          fail=0
          for cask_file in Casks/*.rb; do
            cask="$(basename "$cask_file" .rb)"
            full="${TAP_FULL_NAME}/${cask}"
            echo "::group::${full}"
            # bump-cask-pr:
            #   --no-fork    push the bump branch to this repo, not a fork
            #   --no-browse  don't try to open a browser
            #   --no-audit   skip the cask audit step (the cask was already
            #                audited when it landed)
            # It exits non-zero ("error: A newer version of <cask> is not
            # available.") when already at latest — that's expected; don't kill
            # the loop. We still surface unexpected errors at the end.
            if ! brew bump-cask-pr --no-fork --no-browse --no-audit "${full}" 2>&1; then
              echo "(bump-cask-pr exited non-zero — likely 'already at latest' or 'PR exists'; continuing)"
            fi
            echo "::endgroup::"
          done
          # Always succeed: per-cask up-to-date is the normal, non-error state.
          exit 0
